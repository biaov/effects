<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <title>代码压缩工具</title>
    <meta name="keywords" content="压缩工具,压缩,压缩代码, HTML, JavaScript, CSS" />
    <meta name="description" content="一个用于压缩代码的工具, 支持压缩 HTML, JavaScript, CSS" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="compress">
      <h1 class="title">代码压缩工具</h1>
      <p class="desc">支持 HTML, JavaScript, CSS</p>
      <textarea placeholder="请输入要压缩的内容" class="textarea"></textarea>
      <div class="tips"></div>
      <div class="buttons">
        <div class="btn" data-type="compress">压缩</div>
        <div class="btn" data-type="copy">复制</div>
        <div class="btn danger" data-type="clear">清空</div>
      </div>
    </div>
    <!-- <script type="module" async src="https://unpkg.com/html-minifier-next@5.0.3/dist/htmlminifier.esm.bundle.js"></script> -->
    <script src="https://unpkg.com/terser@5.46.0/dist/bundle.min.js"></script>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
