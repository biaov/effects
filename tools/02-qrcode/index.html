<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>二维码生成器</title>
    <meta name="keywords" content="二维码生成器" />
    <meta name="description" content="二维码生成器" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>生成二维码</h1>
      </div>
      <textarea class="textarea" placeholder="请输入内容"></textarea>
      <div class="buttons">
        <button class="button button--download">下载图片</button>
        <button class="button button--copy">复制内容</button>
        <button class="button button--parse">
          解析二维码
          <input type="file" class="input" accept="image/*" />
        </button>
        <button class="button button--scan">扫描二维码</button>
      </div>
      <img class="qrcode" />
    </div>
    <div class="video-container">
      <video class="video" width="100vw" height="100vh"></video>
      <div class="scan"></div>
    </div>
    <canvas class="canvas"></canvas>
    <script src="./js/index.js" type="module"></script>
  </body>
</html>
