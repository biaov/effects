<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>二维码生成器</title>
    <meta name="keywords" content="二维码生成器" />
    <meta name="description" content="二维码生成器" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f5f5f5;
      }

      .container {
        width: 80%;
        margin: 0 auto;
        padding-top: 20px;
      }

      .textarea {
        display: block;
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.1);
        padding: 10px;
        font-size: 14px;
        min-height: 300px;
        margin-bottom: 20px;
      }

      .textarea:focus {
        outline: none;
      }

      .download-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        width: 120px;
        font-size: 14px;
        background: #333;
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.3s;
        margin-bottom: 20px;
      }

      .download-btn:hover {
        background: #000;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <textarea class="textarea" placeholder="请输入内容"></textarea>
      <button class="download-btn" onclick="downloadQrcode()">下载图片</button>
      <img class="qrcode" />
    </div>
    <script src="./qrcode.min.js"></script>
    <script>
      let qrcodeNode = null
      function downloadQrcode() {
        qrcodeNode = document.querySelector('.qrcode')
        if (!qrcodeNode.src) {
          alert('请先生成二维码')
          return
        }
        const a = document.createElement('a')
        a.href = qrcodeNode.src
        a.download = 'qrcode.png'
        a.click()
      }
      window.onload = () => {
        const textarea = document.querySelector('.textarea')
        const qrcodeNode = document.querySelector('.qrcode')
        window.addEventListener('input', e => {
          const { value } = e.target
          if (!value) {
            qrcodeNode.src = ''
            return
          }

          QRCode.toDataURL(e.target.value, { width: 256, height: 256, margin: 2 }, (error, url) => {
            if (error) {
              console.log(error)
              return
            }
            qrcodeNode.src = url
          })
        })
      }
    </script>
  </body>
</html>
